workspace = ".agmh"
mode = "full"
dry_run = false
verbose = 0
tui = true
insecure_tls = false
sources_file = "targets.txt"

[github]
# Optional defaults for GitHub source URLs from sources_file or [github].profiles.
tokens = [
  { env = "GITHUB_TOKEN", name = "github-primary" },
  # { env = "GITHUB_TOKEN_2", name = "github-secondary" },
]

# Use inline sources when a non-GitHub source needs its own token or API base.
# [[sources]]
# url = "https://gitlab.com/extencil"
# platform = "gitlab"
# tokens = [{ env = "GITLAB_SOURCE_TOKEN", name = "gitlab-source" }]
#
# [[sources]]
# url = "https://codeberg.org/extencil"
# platform = "forgejo"
# tokens = [{ env = "CODEBERG_SOURCE_TOKEN", username = "extencil" }]

[backup]
local_dir = "backups"
clone_protocol = "https"
include_archived = true
include_forks = true
include_private_for_authenticated_user = true
lfs = false
push_mode = "mirror"

[retry]
max_retries = 5
base_delay_seconds = 1.5
max_delay_seconds = 60
request_timeout_seconds = 15
rate_limit_sleep_seconds = 300
wait_on_rate_limit = true

[git]
author_name = "agmh"
author_email = "agmh@localhost"
commit_message = "Add AGMH backup marker"
# ssh_identity_file = "/home/user/.ssh/sourcehut_ed25519"
# ssh_identities_only = true
# ssh_batch_mode = false
# ssh_strict_host_key_checking = "accept-new"
# ssh_command = "ssh -i /home/user/.ssh/sourcehut_ed25519 -o IdentitiesOnly=yes"

[[destinations]]
url = "https://gitlab.com/extencil"
platform = "gitlab"
tokens = [{ env = "GITLAB_TOKEN", name = "gitlab-primary" }]
visibility = "mirror"
push_mode = "mirror"

[[destinations]]
url = "https://github.com/extencil-mirror"
platform = "github"
tokens = [{ env = "GITHUB_DEST_TOKEN", name = "github-destination" }]
visibility = "mirror"
push_mode = "mirror"

[[destinations]]
url = "https://codeberg.org/extencil"
platform = "forgejo"
tokens = [{ env = "CODEBERG_TOKEN", username = "extencil" }]
visibility = "mirror"
push_mode = "mirror"

[[destinations]]
url = "https://bitbucket.org/extencil"
platform = "bitbucket"
tokens = [{ env = "BITBUCKET_TOKEN", username = "you@example.com" }]
visibility = "mirror"
push_mode = "mirror"

[[destinations]]
url = "https://git.sr.ht/~extencil"
platform = "sourcehut"
tokens = [{ env = "SOURCEHUT_TOKEN", name = "sourcehut-primary" }]
visibility = "mirror"
push_mode = "mirror"
push_url_template = "git@git.sr.ht:~{owner}/{repo}"
